# ==========================================
# Docker Compose - 教培直播系统完整编排
# 
# 包含：
#   - Node.js 后端服务
#   - MySQL 8 数据库
#   - Redis 6 缓存
#   - Nginx 反向代理
# 
# 使用方式：
#   docker-compose up -d          # 启动所有服务
#   docker-compose down           # 停止所有服务
#   docker-compose logs -f app    # 查看后端日志
#   docker-compose ps             # 查看服务状态
# ==========================================

version: '3.8'

services:
  # Node.js 后端服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edu-live-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=edu_live
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-YourStrongPassword123!}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-edu_live_prod_secret_key_2024}
      - BASE_URL=${BASE_URL:-https://api.yourdomain.com}
      # 微信支付
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
      - WX_MCHID=${WX_MCHID}
      - WX_PRIVATE_KEY=${WX_PRIVATE_KEY}
      - WX_SERIAL_NO=${WX_SERIAL_NO}
      - WX_APIV3_KEY=${WX_APIV3_KEY}
      # 支付宝
      - ALIPAY_APPID=${ALIPAY_APPID}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY}
      # ZEGO
      - ZEGO_APP_ID=${ZEGO_APP_ID}
      - ZEGO_SERVER_SECRET=${ZEGO_SERVER_SECRET}
      # OSS
      - OSS_REGION=${OSS_REGION}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET=${OSS_BUCKET}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edu-live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: edu-live-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-YourStrongPassword123!}
      - MYSQL_DATABASE=edu_live
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
    networks:
      - edu-live-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: edu-live-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - edu-live-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: edu-live-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/edu-live-server/uploads:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - edu-live-network

# 数据卷
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# 网络
networks:
  edu-live-network:
    driver: bridge
