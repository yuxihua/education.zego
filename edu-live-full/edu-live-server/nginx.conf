# ==========================================
# Nginx 反向代理配置 - 教培直播系统
# 
# 使用方式：
#   1. 将此文件复制到 /etc/nginx/conf.d/edu-live.conf
#   2. 测试配置：nginx -t
#   3. 重载配置：nginx -s reload
# ==========================================

# 上游服务器（Node.js 后端集群）
upstream edu_live_api {
    # 负载均衡策略：最少连接
    least_conn;
    
    # 主节点
    server 127.0.0.1:8080 weight=5 max_fails=3 fail_timeout=30s;
    
    # 如有多个实例，取消下面注释
    # server 127.0.0.1:8081 weight=5 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8082 weight=5 max_fails=3 fail_timeout=30s;
    
    # 备用节点（所有主节点故障时启用）
    # server 127.0.0.1:8083 backup;
}

# 支付回调限流区域（需定义在 server/location 外）
limit_req_zone $binary_remote_addr zone=pay:10m rate=50r/s;

# HTTP 服务器（80 端口）
server {
    listen 80;
    server_name api.yourdomain.com;
    root /var/www/education.zego/edu-live-full/edu-live-admin/dist;
    index index.html;
    
    # 强制 HTTPS（证书配置好后启用下面这行）
    # return 301 https://$server_name$request_uri;
    
    # 日志
    access_log /var/log/nginx/edu-live-access.log;
    error_log /var/log/nginx/edu-live-error.log;
    
    # 请求体大小限制（支持大文件上传）
    client_max_body_size 100M;
    
    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    
    # 前端静态资源（Vite 构建产物）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api/ {
        proxy_pass http://edu_live_api;
        proxy_http_version 1.1;
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（ZEGO 信令可能会用到）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲区
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # 静态资源（上传的图片/视频）
    # 生产环境建议直接使用 OSS/COS，这里作为备用
    location /uploads/ {
        alias /var/www/edu-live-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # 防盗链（可选）
        # valid_referers none blocked server_names *.yourdomain.com;
        # if ($invalid_referer) {
        #     return 403;
        # }
    }
    
    # 健康检查（兼容旧地址）
    location /health {
        proxy_pass http://edu_live_api;
        access_log off;
    }
    
    # 限制支付回调接口频率
    location /api/pay/ {
        proxy_pass http://edu_live_api;

        # 支付回调限流：每秒最多 50 请求
        limit_req zone=pay burst=100 nodelay;
    }
    
    # ZEGO 回调（放宽超时）
    location /api/zego/callback {
        proxy_pass http://edu_live_api;
        proxy_read_timeout 120s;
    }
}

# HTTPS 服务器（443 端口）- 证书配置
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;
    root /var/www/education.zego/edu-live-full/edu-live-admin/dist;
    index index.html;
    
    # SSL 证书（使用 certbot 自动申请或手动配置）
    ssl_certificate /etc/nginx/ssl/yourdomain.crt;
    ssl_certificate_key /etc/nginx/ssl/yourdomain.key;
    
    # SSL 会话缓存
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # SSL 协议和加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    
    # HSTS（强制 HTTPS）
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # 日志
    access_log /var/log/nginx/edu-live-ssl-access.log;
    error_log /var/log/nginx/edu-live-ssl-error.log;
    
    client_max_body_size 100M;
    
    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://edu_live_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    location /uploads/ {
        alias /var/www/edu-live-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
