# iot.hualongda.com.cn 生产配置（前后端同域）
# 前端: /var/www/edu-live-admin/dist
# 后端: 127.0.0.1:8080

upstream edu_live_api {
    least_conn;
    server 127.0.0.1:8080 weight=5 max_fails=3 fail_timeout=30s;
}

# 支付回调限流区域（需定义在 server/location 外）
limit_req_zone $binary_remote_addr zone=pay:10m rate=50r/s;

server {
    listen 80;
    server_name iot.hualongda.com.cn;

    # 如已配置证书，建议打开 80->443 跳转
    # return 301 https://$host$request_uri;

    root /var/www/edu-live-admin/dist;
    index index.html;

    access_log /var/log/nginx/edu-live-access.log;
    error_log /var/log/nginx/edu-live-error.log;

    client_max_body_size 100M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 前端静态资源与 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 仅走 /api 前缀
    location /api/ {
        proxy_pass http://edu_live_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 上传文件直出
    location /uploads/ {
        alias /var/www/edu-live-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查兼容
    location /health {
        proxy_pass http://edu_live_api;
        access_log off;
    }

    # 支付回调限流
    location /api/pay/ {
        proxy_pass http://edu_live_api;
        limit_req zone=pay burst=100 nodelay;
    }

    # ZEGO 回调
    location /api/zego/callback {
        proxy_pass http://edu_live_api;
        proxy_read_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    server_name iot.hualongda.com.cn;

    root /var/www/edu-live-admin/dist;
    index index.html;

    ssl_certificate /etc/nginx/ssl/iot.hualongda.com.cn.crt;
    ssl_certificate_key /etc/nginx/ssl/iot.hualongda.com.cn.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000" always;

    access_log /var/log/nginx/edu-live-ssl-access.log;
    error_log /var/log/nginx/edu-live-ssl-error.log;

    client_max_body_size 100M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://edu_live_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /var/www/edu-live-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
